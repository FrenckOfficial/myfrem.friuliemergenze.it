<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title id="profileTitle">Profilo | MyFrEM</title>

    <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="/profile/style.css">

    <script>
        window.va = window.va || function () {
            (window.vaq = window.vaq || []).push(arguments);
        };
    </script>

    <script defer src="/_vercel/insights/script.js"></script>
    <script type="module" src="/profile/script.js"></script>
</head>
<body>
    <div class="profileBanner"></div>
    <main class="profileWrapper">
        <div class="profileCard">
            <div class="profileTop">
                <div class="avatarContainer">
                    <img id="profileAvatar" class="profileAvatar" src="/assets/profile/defpic.png" alt="Avatar utente" >
                    <div class="statusDot" id="statusDot"></div>
                </div>

                <div class="profileIdentity">
                    <h1 id="profileName">Utente</h1>
                    <p id="profileUsername">@username</p>
                    <div class="profileBadges" id="profileBadges"></div>
                </div>
            </div>

            <div class="profileGrid">
                <div class="infoCard">
                    <span>Email</span>
                    <h3 id="profileEmail">N/D</h3>
                </div>
                <div class="infoCard">
                    <span>Ruolo</span>
                    <h3 id="profileRole">N/D</h3>
                </div>
                <div class="infoCard">
                    <span>Status</span>
                    <h3 id="profileStatus">N/D</h3>
                </div>
            </div>

            <div class="statsGrid" id="statsGrid">
                <div class="statCard">
                    <span>📸 Foto caricate</span>
                    <h2 id="userPhotos">0</h2>
                </div>
                <div class="statCard">
                    <span>🚨 Eventi pubblicati</span>
                    <h2 id="userEvents">0</h2>
                </div>
                <div class="statCard">
                    <span>⭐ Membro dal</span>
                    <h2 id="userSince">2025</h2>
                </div>
                <div class="statCard" id="statHiddenCard" style="visibility:hidden;"></div>
                <div class="statCard">
                    <span>🏅 Badge attività</span>
                    <h2 id="userBadge">NUOVO</h2>
                </div>
            </div>

            <div class="staffGrid none" id="staffGrid">
                <div class="statCard">
                    <span>🛡️ Livello staff</span>
                    <h2 id="staffRole">STAFF</h2>
                </div>
                <div class="statCard">
                    <span>⚙️ Permessi</span>
                    <h2 id="staffPerms">BASE</h2>
                </div>
                <div class="statCard">
                    <span>📅 Staff dal</span>
                    <h2 id="staffSince">2025</h2>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
