<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le mie Foto | Piattaforma MyFrEM di FriuliEmergenze</title>
  <link rel="stylesheet" href="/dashboard/dsh.css">
  <link rel="shortcut icon" href="https://www.friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js"></script>
  <script type="module" src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"></script>
</head>
<body>
  <div class="loading">
    <div class="loader"></div>
    <p>Caricamento in corso...</p>
  </div>
  <div class="content" style="display:none;">
    <aside class="sidebar">
      <div class="logo">
        <img src="https://www.friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
        <h2>MyFrEM</h2>
      </div>
      <nav>
        <a href="/dashboard">🏠 Home</a>
        <a href="/dashboard/upload">📸 Carica una foto</a>
        <a href="/dashboard/propose/">🗂️ Proponi un evento</a>
        <a href="/dashboard/my-content">📚 I miei contenuti</a>
        <a href="/dashboard/myfrem-photos" class="active">📸 Tutte le foto</a>
        <a href="/dashboard/settings/">⚙️ Impostazioni</a>
        <a href="/dashboard/contact/">📞 Contattaci</a>
      </nav>
      <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>

    <div class="main-content">
      <div class="content-box" style="max-width:none;">
        <h1>📸 Tutte le foto</h1>
        <p class="statusBox" style="display:none;">
          <span id="statusMsg"></span>
          <button id="closeSMsg">&times;</button>
        </p>
        <div id="photosContainer" class="photos-grid">
          <!-- Qui verranno generate le foto con JS -->
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/dashboard/myfrem-photos/load.js"></script>
  <script src="/scripts/shinystat.js?USER=SS-55951055-66dfb" style="display:none;"></script>
  <noscript>
    <a href="https://www.shinystat.com/it/" target="_top">
    <img src="//www.shinystat.com/cgi-bin/shinystat.cgi?USER=SS-55951055-66dfb" alt="Statistiche web" style="border:0px" /></a>
  </noscript>
</body>
</html>
