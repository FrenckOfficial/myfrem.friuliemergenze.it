<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carica una Foto | MyFrEM FriuliEmergenze</title>
  <link rel="stylesheet" href="/dashboard/dsh.css">
  <link rel="shortcut icon" href="https://www.friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="loading">
    <div class="loader"></div>
    <p>Caricamento in corso...</p>
  </div>
  <div class="content" style="display:none;">
    <aside class="sidebar">
        <div class="logo">
          <img src="https://www.friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo" loading="lazy">
          <h2>MyFrEM</h2>
        </div>
        <nav>
          <a href="/dashboard">🏠 Home</a>
          <a href="/dashboard/upload" class="active">📸 Carica una foto</a>
          <a href="/dashboard/propose/">🗂️ Proponi un evento</a>
          <a href="/dashboard/my-content">📚 I miei contenuti</a>
          <a href="/dashboard/myfrem-photos">📸 Tutte le foto</a>
          <a href="/dashboard/settings/">⚙️ Impostazioni</a>
          <a href="/dashboard/contact/">📞 Contattaci</a>
        </nav>
        <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>
  
    <div class="main-content">
        <h1>📸 Carica una Foto</h1>
        <div class="statusBox" style="display:none;">
          <span id="statusMsg"></span>
          <button id="closeSMsg">&times;</button>
        </div>
        <form id="uploadForm">
          <div class="form-group" style="display:flex;flex-direction:row;gap:20px;">
            <div class="mini-group">
              <label>Modello del veicolo <b>*</b></label>
              <input type="text" id="title" required>
            </div>
  
            <div class="mini-group">
              <label>Targa</label>
              <input type="text" id="licensePlate">
            </div>
          </div>
  
          <div class="form-group" style="display:flex;flex-direction:row;gap:20px;">
            <div class="mini-group">
              <label>Allestitore</label>
              <input type="text" id="sponsor">
            </div>
            
            <div class="mini-group">
              <label>Sede di appartenenza <b>*</b></label>
              <input type="text" id="location" required>
            </div>
          </div>
          
  
          <label>Tipologia di servizio svolto <b>*</b></label>
          <select id="serviceType" required style="margin-top:0;">
            <option value="none">Seleziona una tipologia</option>
            <option value="emergenza-sanitaria">Ambulanza Territoriale (ex 118)</option>
            <option value="trasporti-secondari">Trasporti Sanitari Secondari</option>
            <option value="soccorso-tecnico-urgente">Soccorso Tecnico Urgente (ex 115)</option>
            <option value="ordine-pubblico">Ordine Pubblico (ex 112-113 e GdF)</option>
            <option value="guardia-costiera">Guardia Costiera</option>
            <option value="protezione-civile">Protezione Civile</option>
            <option value="altro">Altro (specificare nel campo note)</option>
          </select>
  
          <label style="margin-top:20px;">Note aggiuntive</label>
          <input type="text" id="notes" style="margin-top:0;">
  
          <div class="form-group" style="display:flex;flex-direction:row;gap:20px;">
            <input type="file" id="inp-upl" multiple accept="image/*">
            <label for="inp-upl">📤 Scegli foto</label>
            <span id="file-name">Nessun file</span>
          </div>
  
          <progress id="progressBar" value="0" max="100" style="width:100%;display:none;"></progress>
          <p id="progressText" style="display:none;"></p>
  
          <button id="btn-upl">📤 Carica</button>
          <p id="disclaimer">Tutti i campi evidenziati con * sono richiesti</p>

          <div id="previewContainer" class="preview-container">
            <div class="preview-wrapper">
              <img id="preview" class="preview-image" alt="Anteprima foto" />
              <button type="button" id="deletePreviewBtn" class="delete-preview-btn" title="Elimina preview">
                <i class="fa-solid fa-trash-can" style="color: rgb(255, 255, 255);"></i>
              </button>
            </div>
          </div>
        </form>
    </div>
  </div>

  <script type="module" src="/dashboard/upload/upload.js"></script>
  <script src="/scripts/shinystat.js?USER=SS-55951055-66dfb" style="display:none;"></script>
  <noscript>
    <a href="https://www.shinystat.com/it/" target="_top">
    <img src="//www.shinystat.com/cgi-bin/shinystat.cgi?USER=SS-55951055-66dfb" alt="Statistiche web" style="border:0px" /></a>
  </noscript>
</body>
</html>
