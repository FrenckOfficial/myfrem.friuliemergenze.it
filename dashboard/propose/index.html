<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compila Richiesta Organizzazione Evento | MyFrEM - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
    <link rel="stylesheet" href="/dashboard/dsh.css">
    <link rel="shortcut icon" href="https://www.friuliemergenze.it/assets/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script type="module" src="/dashboard/propose/create.js"></script>
    <style>
      .form-group {
        flex-direction:column
      }
    </style>
</head>
<body>
  <div class="loading">
    <div class="loader"></div>
    <p>Caricamento in corso...</p>
  </div>
  <div class="content" style="display:none;">
    <aside class="sidebar">
        <div class="logo">
          <img src="https://www.friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
          <h2>MyFrEM</h2>
        </div>
        <nav>
          <a href="/dashboard">🏠 Home</a>
          <a href="/dashboard/upload">📸 Carica una foto</a>
          <a href="/dashboard/propose/" class="active">🗂️ Proponi un evento</a>
          <a href="/dashboard/my-content">📚 I miei contenuti</a>
          <a href="/dashboard/myfrem-photos">📸 Tutte le foto</a>
          <a href="/dashboard/settings/">⚙️ Impostazioni</a>
          <a href="/dashboard/contact/">📞 Contattaci</a>
        </nav>
        <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>

    <main class="main-content">
        <h2>📅 Richiedi l'organizzazione di un evento</h2>

        <div class="statusBox" style="display:none;">
          <span id="statusMsg"></span>
          <button id="closeSMsg">&times;</button>
        </div>

        <form id="eventForm" class="event-form">
          <div class="form-group">
            <label for="eventTitle">📌 Titolo Evento *</label>
            <input type="text" id="eventTitle" required>
          </div>
          <div class="form-group">
            <label for="description">📝 Descrizione dettagliata *</label>
            <textarea id="description" required></textarea>
          </div>
          <div class="form-group">
            <label for="location">📍 Luogo di incontro suggerito *</label>
            <input type="text" id="location" required>
          </div>
          <div class="form-group">
            <label for="contact">📞 Contatto (o nome utente WhatsApp) *</label>
            <input type="text" id="contact" required>
          </div>

          <button type="submit" class="btn-primary">📤 Invia proposta evento</button>
        </form>
    </main>
  </div>
  <script src="/scripts/shinystat.js?USER=SS-55951055-66dfb" style="display:none;"></script>
  <noscript>
    <a href="https://www.shinystat.com/it/" target="_top">
    <img src="//www.shinystat.com/cgi-bin/shinystat.cgi?USER=SS-55951055-66dfb" alt="Statistiche web" style="border:0px" /></a>
  </noscript>
</body>
</html>
