<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrati - Zona Logins | Piattaforma MyFrEM - La migliore in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>

  <link rel="stylesheet" href="/login/style.css" />
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" />

  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
</head>

<body>

  <main class="auth-wrapper">

    <section class="auth-card">

      <header class="auth-header">
        <h1 class="logo">MyFrEM</h1>
        <p class="subtitle">Crea il tuo account</p>
      </header>

      <form id="registerForm" class="auth-form">

        <div class="grid-2">

          <div class="form-group">
            <label for="registerName">Nome</label>
            <input type="text" id="registerName" required placeholder="Mario" />
          </div>

          <div class="form-group">
            <label for="registerSurname">Cognome</label>
            <input type="text" id="registerSurname" required placeholder="Rossi" />
          </div>

        </div>

        <div class="form-group">
          <label for="registerUsername">Username</label>
          <input type="text" id="registerUsername" required placeholder="mariorossi" />
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input type="email" id="registerEmail" required placeholder="nome@esempio.com" />
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="registerPassword" required placeholder="••••••••" />
            <button type="button" class="toggle-password"
              onclick="togglePassword('registerPassword', this)"
              aria-label="Mostra password">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="registerConfirmPassword">Conferma password</label>
          <div class="password-wrapper">
            <input type="password" id="registerConfirmPassword" required placeholder="••••••••" />
            <button type="button" class="toggle-password"
              onclick="togglePassword('registerConfirmPassword', this)"
              aria-label="Mostra password">
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="primary-btn">Crea account</button>

        <p class="auth-links">
          Hai già un account?
          <a href="/login/signin">Accedi</a>
        </p>

      </form>

      <a class="back-home" href="/">
        ← Torna alla homepage
      </a>

      <div class="messages">
        <p id="error" class="error"></p>
        <p id="messageBox"></p>
      </div>

    </section>

  </main>

  <script type="module" src="/login/app.js"></script>

  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector("i");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>

</body>
</html>
