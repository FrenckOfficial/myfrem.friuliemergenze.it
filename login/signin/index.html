<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accedi - Zona Logins | Piattaforma MyFrEM - La migliore in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>

  <link rel="stylesheet" href="/login/style.css" />
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    crossorigin="anonymous" />

  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
</head>

<body>

  <main class="auth-wrapper">

    <section class="auth-card">

      <header class="auth-header">
        <h1 class="logo">MyFrEM</h1>
        <p class="subtitle">Accedi al tuo account</p>
      </header>

      <button id="googleLoginBtn" class="google-btn" type="button">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continua con Google
      </button>

      <div class="divider">
        <span>oppure</span>
      </div>

      <form id="loginForm" class="auth-form">

        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input
            type="email"
            id="loginEmail"
            required
            autocomplete="email"
            placeholder="nome@esempio.com"
          />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>

          <div class="password-wrapper">
            <input
              type="password"
              id="loginPassword"
              required
              autocomplete="current-password"
              placeholder="••••••••"
            />

            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('loginPassword', this)"
              aria-label="Mostra o nascondi password"
            >
              <i class="far fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="primary-btn">Accedi</button>

        <div class="auth-links">
          <a href="/login/reset-your-password/">Password dimenticata?</a>
          <p>o</p>
          <a href="/login/signup/">Crea un account</a>
        </div>

      </form>

      <a class="back-home" href="/">
        ← Torna alla homepage
      </a>

      <div class="messages">
        <p id="error" class="error"></p>
        <p id="success" class="success"></p>
        <p id="messageBox"></p>
      </div>

    </section>

  </main>

  <script type="module" src="/login/app.js"></script>

  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const icon = button.querySelector("i");

      if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
      } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
      }
    }
  </script>

</body>
</html>
