<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Tutte le Foto | MyFrEM - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon">
  <link rel="stylesheet" href="/staff/dashboard/staff.css">
  <script type="module" src="./all-photos.js"></script>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <img src="https://friuliemergenze.it/assets/logo.png">
      <h2>MyFrEM Staff</h2>
    </div>
    <nav>
      <a href="/staff">📊 Dashboard</a>
      <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
      <a href="/staff/dashboard/users/">👥 Funzionalità</a>
      <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
      <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
      <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
      <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
    </nav>
    <button id="logoutBtn" class="logout">🚪 Logout</button>
  </aside>

  <div class="main-content">
    <h1>🗂️ Tutte le foto caricate</h1>
    <table class="photos-table">
      <thead>
        <tr>
          <th>Anteprima</th>
          <th>Titolo</th>
          <th>Utente</th>
          <th>Stato</th>
          <th>Data</th>
          <th>Link mezzo</th>
        </tr>
      </thead>
      <tbody id="photosTbody">
        <tr><td colspan="6">Caricamento...</td></tr>
      </tbody>
      
      <p id="messageBox"></p>
    </table>
  </div>
</body>
</html>
