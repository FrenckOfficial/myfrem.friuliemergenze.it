<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Sondaggio | MyFrEM - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
    <link rel="shortcut icon" href="https://www.friuliemergenze.it/assets/logo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/staff/dashboard/management/users-whatsapp/edit/style.css">
    <script type="module" src="/staff/dashboard/management/surveys/edit/edit.js"></script>
    <style>
        .sidebar {
            height: 97%;
            width: 225px
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 94.5%;
                height: auto;
                position: relative;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
      <div class="logo">
        <img src="https://www.friuliemergenze.it/assets/logo.png" alt="Logo">
        <h2>MyFrEM Staff</h2>
      </div>
      <nav>
        <a href="/staff/dashboard/">📊 Dashboard</a>
        <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
        <a href="/staff/dashboard/surveys/" class="active">📋 Sondaggi</a>
        <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
        <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
        <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
        <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
      </nav>
      <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>

    <main class="main-content">
        <p class="statusBox" style="display:none;">
          <span id="statusMsg"></span>
          <button id="closeSMsg">&times;</button>
        </p>
        <div id="surveyDetails"></div>

        <form class="editForm">
            <label for="surveyTitle">📝 Titolo sondaggio:</label>
            <input type="text" id="surveyTitle" name="surveyTitle" required>

            <label for="surveyDescription">📄 Descrizione:</label>
            <textarea id="surveyDescription" name="surveyDescription" required></textarea>

            <label for="compilabileFino">📅 Compilabile fino a:</label>
            <input type="date" id="compilabileFino" name="compilabileFino" required>

            <label for="surveyLink">🔗 Link del sondaggio:</label>
            <input type="url" id="surveyLink" name="surveyLink" required>
            <small style="color: var(--text-secondary, #666); display: block; margin-top: 5px; margin-bottom: 10px;">
                ⚠️ Il link deve iniziare con <strong>friuliemergenze.it</strong> o <strong>www.friuliemergenze.it</strong>
            </small>
            <div id="linkValidation" style="margin-top:8px;font-size:14px;display:none;"></div>

            <label for="status">📊 Stato sondaggio:</label>
            <select id="status" name="status">
                <option value="active">Attivo</option>
                <option value="archived">Archiviato</option>
                <option value="draft">Bozza</option>
            </select>

            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn-primary">💾 Salva Modifiche</button>
                <button type="button" id="backBtn" class="btn-secondary" style="background: #666; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; cursor: pointer;">↩️ Torna indietro</button>
            </div>
        </form>

        <p id="statusMsg"></p>
    </main>
</body>
</html>
