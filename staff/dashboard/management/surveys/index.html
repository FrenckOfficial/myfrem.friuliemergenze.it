<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Sondaggi | Dashboard Staff - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link rel="stylesheet" href="/staff/dashboard/management/users-whatsapp/style.css">
  <link rel="shortcut icon" href="https://www.friuliemergenze.it/assets/logo.png" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/staff/dashboard/management/surveys/load.js"></script>
</head>
<body>
  <div class="loading">
    <div class="loader"></div>
    <p>Caricamento in corso...</p>
  </div>
  <div class="content" style="display:none;">
    <aside class="sidebar">
      <div class="logo">
        <img src="https://www.friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
        <h2>MyFrEM Staff</h2>
      </div>
      <nav>
        <a href="/staff/dashboard/">📊 Dashboard</a>
        <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
        <a href="/staff/dashboard/surveys/" class="active">📋 Sondaggi</a>
        <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
        <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
        <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
        <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
      </nav>
      <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>
  
    <main class="main-content">
      <h1>Gestione Sondaggi - 📋 Sondaggi</h1>
  
      <div class="list">
        <a href="/staff/dashboard/management/surveys/new/" class="btn-primary">➕ Nuovo sondaggio</a>
        <p id="totalSurveys"><b>Sondaggi totali: <span id="totalSurveysCount">0</span></b></p>
      </div>
  
      <p class="statusBox" style="display:none;">
        <span id="statusMsg"></span>
        <button id="closeSMsg">&times;</button>
      </p>
  
      <div class="gallery-search" style="margin-top: 10px;">
        <input type="text" id="searchInput" placeholder="Cerca un sondaggio..." style="
          width: 50%;
          padding: 0.75rem;
          margin: 1rem 0;
          border: 1px solid #ccc;
          border-radius: 8px;
          font-size: 1rem;
        ">
      </div>
  
      <table id="surveysTable">
        <thead>
          <tr>
            <th>Titolo</th>
            <th>Descrizione</th>
            <th>Compilabile fino</th>
            <th>Link</th>
            <th>Stato</th>
            <th style="text-align:center;">Azioni</th>
          </tr>
        </thead>
        <tbody id="surveysTableBody">
          <!-- JS Loading -->
        </tbody>
      </table>

      <script>
        const searchInput = document.getElementById("searchInput");
        const tableBody = document.getElementById("surveysTableBody");
  
        searchInput.addEventListener("keyup", () => {
          const filter = searchInput.value.toLowerCase();
          const rows = tableBody.querySelectorAll("tr");
  
          rows.forEach(row => {
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
          });
        });
      </script>
    </main>
  </div>
</body>
</html>
