<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Utenti MyFrEM | Dashboard Staff - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link rel="stylesheet" href="/staff/dashboard/management/users-platform/style.css">
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon">
  <script type="module" src="/staff/dashboard/management/users-platform/users.js"></script>
  <style>
    .sidebar {
      height: 97%;
      width: 225px
    }
  </style>
</head>
<body>
  <!-- Sidebar Staff -->
  <aside class="sidebar">
    <div class="logo">
      <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
      <h2>MyFrEM Staff</h2>
    </div>
    <nav>
      <a href="/staff">📊 Dashboard</a>
      <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
      <a href="/staff/dashboard/users/" class="active">👥 Funzionalità</a>
      <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
      <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
      <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
      <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
    </nav>
    <button id="logoutBtn" class="logout">🚪 Logout</button>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <h1>MyFrEM - 👥 Funzionalità</h1>

    <table id="usersTable">
        <thead>
            <tr>
              <th>Nome</th>
              <th>Cognome</th>
              <th>Email</th>
              <th>Nome Utente</th>
              <th>Tipo Account</th>
              <th>Stato Account</th>
              <th>Azioni</th>
            </tr>
        </thead>
        <tbody id="usersTableBody">
            <!-- Gli utenti verranno inseriti qui tramite JS -->
        </tbody>
    </table>

    <p id="messageBox"></p>
  </main>
</body>
</html>
