<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend&display=swap" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Dati - Tutte le attività | Dashboard Staff - La migliore piattaforma in Friuli-Venezia Giulia nel caricamento foto inerenti l'emergenza</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="/staff/dashboard/activities/export/style.css">
  <link rel="shortcut icon" href="https://friuliemergenze.it/assets/logo.png" type="image/x-icon">
  <script type="module" src="/staff/dashboard/activities/export/export.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
        <img src="https://friuliemergenze.it/assets/logo.png" alt="MyFrEM Logo">
        <h2>MyFrEM Staff</h2>
        </div>
        <nav>
        <a href="/staff" class="active">📊 Dashboard</a>
        <a href="/staff/dashboard/photos/">🖼️ Moderazione foto</a>
        <a href="/staff/dashboard/users/">👥 Funzionalità</a>
        <a href="/staff/dashboard/events/">🗂️ Moderazione eventi</a>
        <a href="/staff/dashboard/kick-reports/">🗂️ Rapporti di espulsione</a>
        <a href="/staff/dashboard/contactrq/">📞 Richieste di assistenza</a>
        <a href="/staff/dashboard/settings/">⚙️ Impostazioni</a>
        </nav>
        <button id="logoutBtn" class="logout">🚪 Logout</button>
    </aside>
    <main class="main-content">
        <h1>Esporta Dati - Tipologia <b>attività</b></h1>
        <div>
            <label>Range temporale:</label>
            <select id="range">
            <option value="7">Ultimi 7 giorni</option>
            <option value="30">Ultimi 30 giorni</option>
            <option value="365">Ultimo anno</option>
            </select>
        </div>
        <div>
            <label>User ID (opzionale):</label>
            <input type="text" id="userId" placeholder="abc123">
        </div>
        <br>
        <button id="exportBtn" class="btn-primary">Scarica CSV</button>
        <p id="status"></p>
    </main>
</body>
</html>
